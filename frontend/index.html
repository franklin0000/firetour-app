<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <script nowprocket data-noptimize="1" data-cfasync="false" data-wpfc-render="false" seraph-accel-crit="1" data-no-defer="1">
      (function () {
          var script = document.createElement("script");
          script.async = 1;
          script.src = 'https://emrldtp.com/MjM1Njk2.js?t=235696';
          document.head.appendChild(script);
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔥</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>Fire Tour DR - Excursiones Premium en Punta Cana</title>
    <meta name="description" content="Reserva las mejores excursiones y aventuras de lujo en Punta Cana de forma 100% segura con Stripe. Explora Isla Saona, tirolinas en Cap Cana, paseos al atardecer y más." />

    <!-- Plus Jakarta Sans & Inter Fonts Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- 🚨 Global Runtime Error Diagnostic Catch -->
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        var div = document.createElement('div');
        div.id = 'error-diagnostic-panel';
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.height = '100%';
        div.style.overflow = 'auto';
        div.style.backgroundColor = '#991b1b';
        div.style.color = '#fee2e2';
        div.style.padding = '30px';
        div.style.zIndex = '999999';
        div.style.fontSize = '14px';
        div.style.fontFamily = 'monospace';
        div.style.whiteSpace = 'pre-wrap';
        div.style.boxSizing = 'border-box';
        
        div.innerHTML = '<h1 style="font-size:24px;margin-bottom:15px;font-weight:bold;">🔥 ERROR DE EJECUCIÓN DETECTADO</h1>' +
                        '<strong>Mensaje:</strong> ' + message + '<br><br>' +
                        '<strong>Origen:</strong> ' + source + ' (Línea ' + lineno + ', Columna ' + colno + ')<br><br>' +
                        '<strong>Pila de Llamadas:</strong><br>' + (error ? error.stack : 'No disponible') + '<br><br>' +
                        '<div style="background:#7f1d1d;padding:15px;border-radius:8px;margin-top:15px;">' +
                        '💡 <strong>Recomendación:</strong> Esto suele ocurrir debido a una extensión del navegador activa (como MetaMask SES), o un fallo en los módulos de react-router/stripe. Intenta recargar la página en una pestaña de incógnito o desactiva extensiones de criptomonedas.' +
                        '</div>';
        
        // Wait until document.body exists to append
        if (document.body) {
          document.body.appendChild(div);
        } else {
          window.addEventListener('DOMContentLoaded', function() {
            document.body.appendChild(div);
          });
        }
        return false;
      };

      window.onunhandledrejection = function(event) {
        var div = document.createElement('div');
        div.id = 'promise-diagnostic-panel';
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.height = '100%';
        div.style.overflow = 'auto';
        div.style.backgroundColor = '#581c87';
        div.style.color = '#f3e8ff';
        div.style.padding = '30px';
        div.style.zIndex = '999999';
        div.style.fontSize = '14px';
        div.style.fontFamily = 'monospace';
        div.style.whiteSpace = 'pre-wrap';
        div.style.boxSizing = 'border-box';
        
        div.innerHTML = '<h1 style="font-size:24px;margin-bottom:15px;font-weight:bold;">🔮 PROMESA NO CAPTURADA</h1>' +
                        '<strong>Razón:</strong> ' + event.reason + '<br><br>' +
                        '<strong>Pila de Llamadas:</strong><br>' + (event.reason && event.reason.stack ? event.reason.stack : 'No disponible') + '<br><br>' +
                        '<div style="background:#4c1d95;padding:15px;border-radius:8px;margin-top:15px;">' +
                        '💡 <strong>Recomendación:</strong> Asegúrate de que el servidor local de backend en el puerto 5000 esté activo y de que no haya bloqueos de red CORS.' +
                        '</div>';
        
        if (document.body) {
          document.body.appendChild(div);
        } else {
          window.addEventListener('DOMContentLoaded', function() {
            document.body.appendChild(div);
          });
        }
      };
    </script>
  </head>
  <body class="bg-bgDark text-white select-none">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
